name: Update rankings

on:
  workflow_dispatch:
  schedule:
    # 毎日 00:20 JST = 前日 15:20 UTC
    - cron: "20 15 * * *"

permissions:
  contents: write

concurrency:
  group: update-rankings
  cancel-in-progress: false

jobs:
  build-rankings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create base rankings
        run: python scripts/update_rankings.py

      - name: Show base manifest
        run: cat data/manifest.json

      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A data

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update base rankings"

          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Retry $i failed, retrying..."
            sleep 5
          done
