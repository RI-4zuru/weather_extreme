<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>県内極値一覧</title>
<link rel="stylesheet" href="./style.css">
</head>

<body>

<header class="app-header">

  <div class="title-row">
    <h1>県内極値一覧</h1>
    <div class="header-meta">
      <span>実況観測時刻</span>
      <span id="observedLatestAt">-</span>
    </div>
  </div>

  <div class="control-panel">
    <select id="regionSelect"></select>
    <select id="prefSelect"></select>
    <select id="monthSelect">
      <option value="all">通年</option>
      <option value="1">1月</option>
      <option value="2">2月</option>
      <option value="3">3月</option>
      <option value="4">4月</option>
      <option value="5">5月</option>
      <option value="6">6月</option>
      <option value="7">7月</option>
      <option value="8">8月</option>
      <option value="9">9月</option>
      <option value="10">10月</option>
      <option value="11">11月</option>
      <option value="12">12月</option>
    </select>
  </div>

  <!-- 要素選択 -->
  <div class="element-panel-wrap">
    <button id="elementPanelToggle">要素選択を開く</button>
    <div id="elementPanel" hidden></div>
  </div>

</header>

<main>

<!-- サマリー -->
<section class="summary-section">

  <div class="summary-header">
    <h2>実況で10位以内に入った項目</h2>

    <div class="summary-right">
      <span id="rankInBadge" class="badge red" hidden>ランクイン有り</span>
      <span id="topRankAlert" class="badge strong" hidden>極値1位更新有り</span>
      <button id="summaryToggle">開く</button>
    </div>
  </div>

  <div id="liveSummaryBody" hidden></div>

</section>

<!-- 表 -->
<section>
  <h2 id="tableTitle"></h2>
  <table class="rank-table">
    <thead id="rankTableHead"></thead>
    <tbody id="rankTableBody"></tbody>
  </table>
</section>

</main>

<script type="module" src="./js/app.js"></script>

</body>
</html>
