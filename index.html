<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>県内極値一覧</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="topbar">
    <h1>県内極値一覧</h1>

    <div class="controls">
      <label>
        都道府県
        <select id="prefSelect">
          <option value="nara">奈良県</option>
        </select>
      </label>

      <label>
        要素
        <select id="elementSelect">
          <option value="dailyMaxTemp">日最高気温</option>
        </select>
      </label>

      <label>
        月
        <select id="monthSelect">
          <option value="all">通年</option>
        </select>
      </label>

      <button id="loadBtn">表示</button>
    </div>

    <div class="note">
      赤系: 最新実況で極値10位以内に入る見込み / 黄系: 1年以内の記録
    </div>
    <div id="status" class="status">読み込み待ち</div>
  </header>

  <main class="main">
    <div class="table-wrap">
      <table>
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </main>

  <script src="./app.js"></script>
</body>
</html>
