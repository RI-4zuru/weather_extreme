<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>県内極値一覧</title>

  <meta name="theme-color" content="#0077b6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="県内極値一覧" />

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="topbar">
    <h1>県内極値一覧</h1>

    <div class="controls">
      <label>
        <span>地域</span>
        <select id="regionSelect"></select>
      </label>

      <label>
        <span>都道府県</span>
        <select id="prefSelect"></select>
      </label>

      <label>
        <span>月</span>
        <select id="monthSelect">
          <option value="all">通年</option>
          <option value="1">1月</option>
          <option value="2">2月</option>
          <option value="3">3月</option>
          <option value="4">4月</option>
          <option value="5">5月</option>
          <option value="6">6月</option>
          <option value="7">7月</option>
          <option value="8">8月</option>
          <option value="9">9月</option>
          <option value="10">10月</option>
          <option value="11">11月</option>
          <option value="12">12月</option>
        </select>
      </label>

      <div id="topRankAlert" class="top-rank-alert" hidden aria-hidden="true">
        極値1位更新有り
      </div>
    </div>

    <div class="observed-latest-line">
      <strong>実況観測時刻：</strong>
      <span id="observedLatestAt">読み込み待ち</span>
    </div>

    <details id="liveSummarySection" class="live-summary-details" open>
      <summary class="summary-row">
        <span class="summary-title">実況で10位以内に入った項目</span>
        <span id="rankInBadge" class="rank-in-badge" hidden aria-hidden="true">ランクインあり</span>
      </summary>
      <div id="liveSummaryBody" class="live-summary-body">
        <div class="live-summary-empty">読み込み待ち</div>
      </div>
    </details>

    <details class="element-details">
      <summary>要素選択を開く / 閉じる</summary>
      <div id="elementPanel" class="element-panel">
        <div class="live-summary-empty">読み込み待ち</div>
      </div>
    </details>
  </header>

  <main class="main">
    <section class="status" id="statusBox">
      読み込み待ち
    </section>

    <section class="table-wrap">
      <table id="rankTable">
        <thead id="rankTableHead"></thead>
        <tbody id="rankTableBody"></tbody>
      </table>
    </section>

    <div class="note-bottom">
      赤系：実況での記録 / 黄系：1年以内の記録
    </div>

    <details class="debug-details">
      <summary>診断情報</summary>
      <div class="debug-grid" id="debugGrid"></div>
    </details>
  </main>

  <script src="./js/app.js"></script>
</body>
</html>
