<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>県内極値一覧</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="page">
    <header class="top-panel">
      <div class="top-controls">
        <label>
          <span>地域</span>
          <select id="regionSelect"></select>
        </label>

        <label>
          <span>都道府県</span>
          <select id="prefSelect"></select>
        </label>

        <label>
          <span>月</span>
          <select id="monthSelect">
            <option value="all">通年</option>
            <option value="1">1月</option>
            <option value="2">2月</option>
            <option value="3">3月</option>
            <option value="4">4月</option>
            <option value="5">5月</option>
            <option value="6">6月</option>
            <option value="7">7月</option>
            <option value="8">8月</option>
            <option value="9">9月</option>
            <option value="10">10月</option>
            <option value="11">11月</option>
            <option value="12">12月</option>
          </select>
        </label>
      </div>

      <div class="top-badges" aria-live="polite">
        <span id="recordTopBadge" hidden>極値1位更新有り</span>
      </div>
    </header>

    <section class="live-summary-panel">
      <div class="panel-header">
        <h2>実況で10位以内に入った項目</h2>
        <span id="liveRankBadge" hidden>ランクインあり</span>
      </div>
      <div id="liveSummary">読み込み待ち</div>
    </section>

    <section class="element-panel">
      <button id="elementToggle" type="button" aria-expanded="true">
        ▶ 要素選択を開く / 閉じる
      </button>
      <div id="elementOptions">読み込み待ち</div>
    </section>

    <section class="observed-panel">
      <strong>実況観測時刻</strong>
      <span id="observedLatestAt">読み込み待ち</span>
    </section>

    <section class="table-panel">
      <table>
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </section>

    <p class="legend">赤系：実況での記録 / 黄系：1年以内の記録</p>

    <section class="status-panel">
      <h3>診断情報</h3>
      <div id="status">読み込み待ち</div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
