<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>県内極値一覧</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <h1>県内極値一覧</h1>

    <div class="controls">
      <label>
        都道府県
        <select id="prefSelect">
          <option value="奈良県">奈良県</option>
        </select>
      </label>

      <label>
        要素
        <select id="elementSelect">
          <option value="dailyMaxTemp">日最高気温</option>
          <option value="dailyMinTemp">日最低気温</option>
        </select>
      </label>

      <label>
        月
        <select id="monthSelect">
          <option value="all">通年</option>
          <option value="1">1月</option>
          <option value="2">2月</option>
          <option value="3">3月</option>
          <option value="4">4月</option>
          <option value="5">5月</option>
          <option value="6">6月</option>
          <option value="7">7月</option>
          <option value="8">8月</option>
          <option value="9">9月</option>
          <option value="10">10月</option>
          <option value="11">11月</option>
          <option value="12">12月</option>
        </select>
      </label>

      <button id="loadBtn">表示</button>
    </div>

    <div id="status" class="status">読み込み待ち</div>
  </header>

  <main class="main">
    <div class="table-wrap">
      <table id="extremeTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
